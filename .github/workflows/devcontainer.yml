name: devcontainer
on:
  push:
    branches:
      - '**'
      - '!main'
      - '!next'
      - '!maint/**'
  pull_request:
    branches:
      - main
      - next
      - maint/**
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  devcontainer-test:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || (github.repository_owner != github.event.pull_request.head.repo.owner.login && github.event.pull_request.draft != true)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false

      - name: Build and run dev container task
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          push: never
          runCmd: pnpm build
          env: |
            GITHUB_TOKEN
            SKIP_GITHUB_ISSUES
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SKIP_GITHUB_ISSUES: 'true'
